###########################################
# SERVER CONFIG
###########################################
spring.application.name=${SPRING_APPLICATION_NAME}
server.servlet.context-path=${SERVER_CONTEXT_PATH}
server.port=${SERVER_PORT}
spring.profiles.active=${SPRING_PROFILES_ACTIVE}

###########################################
# JPA / Hibernate Config
###########################################
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO}
spring.jpa.database-platform=${SPRING_JPA_DIALECT}

###########################################
# POSTGRESQL DATABASE
###########################################
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

###########################################
# MONGODB DATABASE
###########################################
spring.data.mongodb.uri=${MONGO_URI}

###########################################
# SMTP / MAIL
###########################################
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.from=${MAIL_FROM}

###########################################
# FRONTEND URL
###########################################
frontend.url=${FRONTEND_URL}

###########################################
# JWT CONFIG
###########################################
spring.jwt.secret=${JWT_SECRET}
spring.jwt.expirationInSeconds=${JWT_EXPIRATION}

###########################################
# CLOUDINARY
###########################################
cloudinary.cloudName=${CLOUDINARY_CLOUD_NAME}
cloudinary.apiKey=${CLOUDINARY_API_KEY}
cloudinary.apiSecret=${CLOUDINARY_API_SECRET}

###########################################
# REDIS CONFIG
###########################################
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=${REDIS_TIMEOUT}
spring.data.redis.database=${REDIS_DATABASE}

###########################################
# TWILIO SMS CONFIG
###########################################
twilio.accountSid=${TWILIO_ACCOUNT_SID}
twilio.authToken=${TWILIO_AUTH_TOKEN}
twilio.fromNumber=${TWILIO_FROM_NUMBER}
twilio.defaultToNumber=${TWILIO_DEFAULT_TO_NUMBER}


###########################################
# OTP CONFIG
###########################################
otp.ttl.minutes=${OTP_TTL_MINUTES}
otp.max.verify.attempts=${OTP_MAX_VERIFY_ATTEMPTS}
otp.block.seconds=${OTP_BLOCK_SECONDS}
otp.temp.token.expiry=${OTP_TEMP_TOKEN_EXPIRY}
otp.length=${OTP_LENGTH}
otp.resend.cooldown=${OTP_RESEND_COOLDOWN}
otp.max.send.per.hour=${OTP_MAX_SEND_PER_HOUR}

###########################################
# OAUTH CLIENTS
###########################################
google.client.id=${GOOGLE_CLIENT_ID}
google.client.secret=${GOOGLE_CLIENT_SECRET}
google.redirect.uri=${GOOGLE_REDIRECT_URI}

github.client.id=${GITHUB_CLIENT_ID}
github.client.secret=${GITHUB_CLIENT_SECRET}
github.redirect.uri=${GITHUB_REDIRECT_URI}